function getTodayQuote(){const r=mulberry32(dateSeed(today()));r();r();r();r();r();const i=Math.floor(r()*QUOTES.length);return{text:QUOTES[i][0],by:QUOTES[i][1]}}
function fmtQ(text){const parts=text.split(/(?<=[。？])/);const r=[];parts.forEach((p,i)=>{if(!p)return;if(i>0)r.push(e("br",{key:"b"+i}));r.push(p)});return r}
function loadHistory(){return sGet(HK)||[]}
function saveToHistory(d,tasks){if(!tasks.length)return;const hist=loadHistory();sSet(HK,[{date:d,tasks:tasks.map(t=>t.text)},...hist.filter(x=>x.date!==d)].slice(0,30))}
function loadStreak(tod){const s=sGet(STK);if(!s){const f={count:1,lastDate:tod};sSet(STK,f);return f}const diff=Math.round((new Date(tod.replace(/\//g,"-"))-new Date(s.lastDate.replace(/\//g,"-")))/86400000);if(diff===0)return s;const u=diff===1?{count:s.count+1,lastDate:tod}:{count:1,lastDate:tod};sSet(STK,u);return u}

function GeoBg({ai=0}){
  const acc=AC[ai%AC.length];
  const paths=um(()=>{const r=mulberry32(dateSeed(today())),W=480,H=920,o=[];
    for(let i=0;i<14;i++){const x=r()*W,y=r()*H,a=r()*Math.PI*2,l=60+r()*350;o.push({t:"l",x1:x,y1:y,x2:x+Math.cos(a)*l,y2:y+Math.sin(a)*l,op:.035+r()*.055,a:r()>.6})}
    for(let i=0;i<5;i++){const cx=r()*W,cy=r()*H,R=40+r()*200,sa=r()*Math.PI*2,sw=.4+r()*2.8;o.push({t:"a",d:`M ${cx+Math.cos(sa)*R} ${cy+Math.sin(sa)*R} A ${R} ${R} 0 ${sw>Math.PI?1:0} 1 ${cx+Math.cos(sa+sw)*R} ${cy+Math.sin(sa+sw)*R}`,op:.03+r()*.05,a:r()>.45})}
    for(let i=0;i<3;i++){const cx=r()*W,cy=r()*H,R=25+r()*120,sides=r()>.5?3:6,rot=r()*Math.PI*2;const pts=[];for(let j=0;j<sides;j++){const a=(Math.PI*2*j)/sides+rot;pts.push(`${cx+Math.cos(a)*R},${cy+Math.sin(a)*R}`)}o.push({t:"p",points:pts.join(" "),op:.03+r()*.045,a:r()>.5})}
    for(let i=0;i<8;i++)o.push({t:"d",cx:r()*W,cy:r()*H,r:1+r()*3,op:.05+r()*.08,a:r()>.4});return o},[]);
  return e("div",{style:{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",display:"flex",justifyContent:"center"}},
    e("svg",{viewBox:"0 0 480 920",preserveAspectRatio:"xMidYMid slice",style:{width:"100%",height:"100%"}},
      paths.map((p,i)=>{const c=p.a?acc:"#fff";
        if(p.t==="l")return e("line",{key:i,x1:p.x1,y1:p.y1,x2:p.x2,y2:p.y2,stroke:c,strokeWidth:.5,opacity:p.op});
        if(p.t==="a")return e("path",{key:i,d:p.d,stroke:c,strokeWidth:.5,fill:"none",opacity:p.op});
        if(p.t==="p")return e("polygon",{key:i,points:p.points,stroke:c,strokeWidth:.5,fill:"none",opacity:p.op});

}
function GlitchText({children,style:s}){
  const[o,so]=h({x:0,y:0,on:false});
  ue(()=>{const id=setInterval(()=>{if(Math.random()<.03){so({x:(Math.random()-.5)*4,y:(Math.random()-.5)*2,on:true});setTimeout(()=>so({x:0,y:0,on:false}),60)}},100);return()=>clearInterval(id)},[]);
  const k=[];if(o.on){k.push(e("span",{key:"r",style:{...s,position:"absolute",left:o.x-1,top:o.y,color:"#ff4d2e",opacity:.7,mixBlendMode:"screen",clipPath:"inset(10% 0 40% 0)"}},children));k.push(e("span",{key:"b",style:{...s,position:"absolute",left:-o.x+1,top:-o.y,color:"#00d4ff",opacity:.5,mixBlendMode:"screen",clipPath:"inset(50% 0 10% 0)"}},children))}
  k.push(e("span",{key:"m"},children));return e("div",{style:{...s,position:"relative"}},k);
}

function ProgressBar({pct,ai}){const a=AC[ai%AC.length],n=AC[(ai+1)%AC.length];return e("div",{style:{position:"fixed",top:0,left:0,height:3,zIndex:10,width:pct+"%",background:`linear-gradient(90deg,${a},${n})`,transition:"width 1s cubic-bezier(.7,0,.3,1)",boxShadow:`0 0 20px ${a}66`}},e("div",{style:{position:"absolute",right:0,top:-2,width:7,height:7,borderRadius:"50%",background:n,boxShadow:`0 0 12px ${n}`}}))}

function cloneTasks(ts){return ts.map(t=>({id:t.id,text:t.text,subs:t.subs.map(s=>({...s}))}))}

// ── Drag reorder + merge hook ──
function useDragReorder(tasks,onReorder,onMerge){
  const dragFrom=ur(null),dragTo=ur(null),mergeTgt=ur(null);
  const[dragIdx,setDragIdx]=h(-1);
  const[overIdx,setOverIdx]=h(-1);
  const[mergeIdx,setMergeIdx]=h(-1);
  const cardRefs=ur({});

  function regRef(id,el){if(el)cardRefs.current[id]=el;else delete cardRefs.current[id]}

  function handleDragStart(i){dragFrom.current=i;setDragIdx(i);mergeTgt.current=null;setMergeIdx(-1)}
  function handleDragMove(clientY){
    if(dragFrom.current===null)return;
    const from=dragFrom.current;
    let closestIdx=-1,minD=Infinity,insideIdx=-1;
    for(let i=0;i<tasks.length;i++){
      const el=cardRefs.current[tasks[i].id];if(!el)continue;
      const r=el.getBoundingClientRect(),mid=r.top+r.height/2;
      const d=Math.abs(clientY-mid);
      if(d<minD){minD=d;closestIdx=i}
      if(clientY>=r.top&&clientY<=r.bottom&&i!==from)insideIdx=i;
    }
    if(insideIdx>=0){
      dragTo.current=null;setOverIdx(-1);
      mergeTgt.current=insideIdx;setMergeIdx(insideIdx);
    }else{
      mergeTgt.current=null;setMergeIdx(-1);
      dragTo.current=closestIdx;setOverIdx(closestIdx);
    }
  }
  function handleDragEnd(){
    const from=dragFrom.current,to=dragTo.current,mt=mergeTgt.current;
    dragFrom.current=null;dragTo.current=null;mergeTgt.current=null;
    setDragIdx(-1);setOverIdx(-1);setMergeIdx(-1);
    if(from===null)return;
    if(mt!==null&&mt!==from){onMerge(from,mt);return}
    if(to!==null&&to!==from)onReorder(from,to);
  }

  function onTouchStart(i){return ev=>{ev.preventDefault();handleDragStart(i)}}
  function onTouchMove(ev){if(dragFrom.current!==null){ev.preventDefault();handleDragMove(ev.touches[0].clientY)}}
  function onTouchEnd(){handleDragEnd()}
  function onMouseDown(i){return ev=>{ev.preventDefault();handleDragStart(i);
    const mm=ev2=>handleDragMove(ev2.clientY);
    const mu=()=>{handleDragEnd();window.removeEventListener("mousemove",mm);window.removeEventListener("mouseup",mu)};
    window.addEventListener("mousemove",mm);window.addEventListener("mouseup",mu)}}

  return{dragIdx,overIdx,mergeIdx,regRef,onTouchStart,onTouchMove,onTouchEnd,onMouseDown}
}

function App(){
  const tod=today(),quote=um(()=>getTodayQuote(),[]);
  const[st,setSt]=h(null);
  const[streak,setStreak]=h(null);
  const[hist,setHist]=h([]);
  const[inp,setInp]=h("");
  const[sugg,setSugg]=h([]);
  const[exitNote,setExitNote]=h("");
  const[showExit,setShowExit]=h(false);
  const[flash,setFlash]=h(false);
  const[scrFlash,setScrFlash]=h(null);
  const[editId,setEditId]=h(null);
  const[editVal,setEditVal]=h("");
  const[editSub,setEditSub]=h(null); // {taskId, si}
  const[editSubVal,setEditSubVal]=h("");
  const[undos,setUndos]=h([]);
  const[expTask,setExpTask]=h(null);
  const[subInp,setSubInp]=h("");
  const iRef=ur(null);

  ue(()=>{
    let s={mode:"home",tasks:[],ci:0,exitNotes:{},date:tod};
    const saved=sGet(SK);
    if(saved){
      const tasks=(saved.tasks||[]).map(t=>{
        if(typeof t==="string")return mkTask(t);
        return{id:t.id||uid(),text:t.text||"",subs:(t.subs||[]).map(s=>typeof s==="string"?{text:s,done:false}:s)};
      });
      if(saved.mode==="focus"||saved.mode==="done")s={...s,...saved,tasks};
      else s={...s,tasks,exitNotes:saved.exitNotes||{}};
    }
    setSt(s);setStreak(loadStreak(tod));setHist(loadHistory());
  },[]);

  ue(()=>{if(st)sSet(SK,st)},[st]);
  ue(()=>{
    if(!inp.trim()){setSugg([]);return}
    const all=[...new Set(hist.flatMap(h=>h.tasks))];
    const cur=st?st.tasks.map(t=>t.text):[];
    setSugg(all.filter(t=>t.includes(inp)&&!cur.includes(t)).slice(0,4));
  },[inp,hist,st]);

  if(!st)return e("div",{style:{minHeight:"100vh",background:"#080808",display:"flex",alignItems:"center",justifyContent:"center"}},e(GeoBg),e("div",{style:{zIndex:1,fontSize:48,fontWeight:900,letterSpacing:-2,color:"#1a1a1a",animation:"pulse 2s ease-in-out infinite"}},"///"));

  const{mode,tasks,ci,exitNotes}=st;
  const cur=tasks[ci];
  const pct=tasks.length>0?(ci/tasks.length)*100:0;
  const dayAcc=AC[Math.floor(mulberry32(dateSeed(tod))()*AC.length)];
  const P={position:"relative",zIndex:1,maxWidth:480,margin:"0 auto",padding:"0 22px 80px"};

  function pushU(){setUndos(u=>[...u.slice(-19),cloneTasks(tasks)])}
  function undo(){if(!undos.length)return;const p=undos[undos.length-1];setUndos(u=>u.slice(0,-1));setSt(s=>({...s,tasks:p}));setEditId(null)}
  function addTask(txt){const t=(txt??inp).trim();if(!t||tasks.length>=5)return;pushU();setSt(s=>({...s,tasks:[...s.tasks,mkTask(t)]}));setInp("");setSugg([]);setTimeout(()=>iRef.current?.focus(),50)}
  function rmTask(id){pushU();setEditId(null);setExpTask(null);setSt(s=>({...s,tasks:s.tasks.filter(t=>t.id!==id)}))}
  function startEdit(id){const task=tasks.find(t=>t.id===id);if(!task)return;setEditId(id);setEditVal(task.text);setExpTask(null);setEditSub(null)}
  function commitEdit(){
    if(editId===null){setEditVal("");return}
    const v=editVal.trim(),task=tasks.find(t=>t.id===editId);
    if(v&&task&&v!==task.text){pushU();setSt(s=>({...s,tasks:s.tasks.map(t=>t.id===editId?{...t,text:v}:t)}))}
    setEditId(null);setEditVal("");
  }
  function reorderTasks(from,to){
    pushU();setSt(s=>{const ts=cloneTasks(s.tasks);const[item]=ts.splice(from,1);ts.splice(to,0,item);return{...s,tasks:ts}});
  }
  function mergeInto(fromIdx,toIdx){
    pushU();setSt(s=>{
      const ts=cloneTasks(s.tasks),src=ts[fromIdx],dst=ts[toIdx];
      dst.subs.push({text:src.text,done:false});
      src.subs.forEach(sub=>dst.subs.push({text:sub.text,done:sub.done}));
      ts.splice(fromIdx,1);
      return{...s,tasks:ts};
    });
    setEditId(null);setExpTask(null);
  }
  function mergeUp(i){if(i<=0)return;mergeInto(i,i-1)}
  function clearAll(){pushU();setSt(s=>({...s,tasks:[]}))}
  function addSub(id){const t=subInp.trim();if(!t)return;setSt(s=>{const ts=cloneTasks(s.tasks);const task=ts.find(t2=>t2.id===id);if(task)task.subs.push({text:t,done:false});return{...s,tasks:ts}});setSubInp("")}
  function rmSub(id,si){setSt(s=>{const ts=cloneTasks(s.tasks);const task=ts.find(t=>t.id===id);if(task)task.subs.splice(si,1);return{...s,tasks:ts}})}
  function startSubEdit(taskId,si){const task=tasks.find(t=>t.id===taskId);if(!task||!task.subs[si])return;setEditSub({taskId,si});setEditSubVal(task.subs[si].text);setEditId(null)}
  function commitSubEdit(){
    if(!editSub){setEditSubVal("");return}
    const v=editSubVal.trim(),{taskId,si}=editSub;
    const task=tasks.find(t=>t.id===taskId);
    if(v&&task&&task.subs[si]&&v!==task.subs[si].text){pushU();setSt(s=>({...s,tasks:s.tasks.map(t=>t.id===taskId?{...t,subs:t.subs.map((sub,j)=>j===si?{...sub,text:v}:sub)}:t)}))}
    setEditSub(null);setEditSubVal("");
  }
  function toggleSub(ti,si){setSt(s=>{const ts=cloneTasks(s.tasks);ts[ti].subs[si].done=!ts[ti].subs[si].done;return{...s,tasks:ts}})}
  function startFocus(){if(!tasks.length)return;saveToHistory(tod,tasks);setHist(loadHistory());setSt(s=>({...s,mode:"focus",ci:0,date:tod}))}
  function completeTask(){setScrFlash(AC[ci%AC.length]);setFlash(true);setTimeout(()=>setScrFlash(null),300);setTimeout(()=>{setFlash(false);setSt(s=>{const n=s.ci+1;return n>=s.tasks.length?{...s,mode:"done"}:{...s,ci:n}})},600)}
  function doExitNext(){const note=exitNote.trim();const nn={...exitNotes};if(note)nn[ci]=note;setExitNote("");setShowExit(false);setSt(s=>{const n=s.ci+1;return n>=s.tasks.length?{...s,exitNotes:nn,mode:"done"}:{...s,exitNotes:nn,ci:n}})}
  function reset(){setSt({mode:"home",tasks:[],ci:0,exitNotes:{},date:tod})}

  // ── HOME ──
